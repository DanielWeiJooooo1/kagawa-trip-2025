        /* Kusama Style Components */
        .kusama-card {
            background-color: white;
            border: 3px solid black;
            box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        
        /* Interactive Buttons */
        .kusama-btn-icon {
            background-color: black;
            color: #fbbf24;
            border: 2px solid black;
            border-radius: 9999px;
            padding: 6px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px 0px rgba(0,0,0,0.5);
        }
        .kusama-btn-icon:hover {
            transform: scale(1.1);
            background-color: #fbbf24;
            color: black;
        }
        .kusama-btn-icon:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,0.5);
        }

        /* Inputs */
        .kusama-input {
            border: 2px solid black;
            padding: 8px 12px;
            border-radius: 0.5rem;
            font-weight: bold;
            width: 100%;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .kusama-input:focus {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,0.2);
            background-color: #fffbeb;
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .timeline-line::before {
            content: ''; position: absolute; top: 0; bottom: 0; left: 19px; width: 4px; background-color: black; z-index: 0;
        }

                        </div>
                        <div className="flex-1 bg-gray-100 relative">
                            <iframe src={getEmbedUrl(query)} className="w-full h-full border-0" allowFullScreen></iframe>
                        </div>
                        <div className="p-4 bg-white border-t-4 border-black shrink-0 text-center">
                            <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`} 
                               target="_blank" 
                               className="kusama-btn inline-block px-6 py-3 rounded-full text-sm no-underline shadow-lg"
                            >
                                開啟 Google Maps App 導航
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        const DiningModal = ({ diningId, options, onClose, onMapClick }) => {
            if (!diningId) return null;
            const data = options[diningId];
            return (
                <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm animate-fade-in" onClick={onClose}>
                    <div className="kusama-card max-w-md w-full overflow-hidden" onClick={e => e.stopPropagation()}>
                        <div className="bg-black p-4 flex justify-between items-center">
                            <h3 className="font-black text-[#fbbf24] flex items-center gap-2 text-lg uppercase tracking-wider">
                                <Icon name="utensils" size={20}/> 餐飲備案
                            </h3>
                            <button onClick={onClose} className="text-white hover:text-[#fbbf24] font-bold text-xl">✕</button>
                        </div>
                        <div className="p-6 space-y-4 bg-white max-h-[60vh] overflow-y-auto">
                            {data && data.map((opt, idx) => (
                                <div key={idx} className={`p-4 rounded-xl border-2 relative ${opt.highlight ? 'bg-yellow-50 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]' : 'bg-white border-gray-200'}`}>
                                    <div className="flex justify-between items-start mb-2 pr-8">
                                        <h4 className="font-bold text-black text-base">{opt.name}</h4>
                                        {opt.highlight && <span className="text-[10px] bg-red-500 text-white px-2 py-1 rounded-full font-black tracking-wide border border-black">推薦</span>}
                                    </div>
                                    <p className="text-sm text-gray-700 leading-relaxed font-medium">{opt.desc}</p>
                                    
                                    {/* Map Button inside card */}
                                    {opt.mapQuery && (
                                        <button 
                                            onClick={() => onMapClick(opt.name, opt.mapQuery)}
                                            className="absolute right-2 top-2 p-2 bg-black text-[#fbbf24] rounded-full hover:scale-110 transition-transform shadow-md"
                                            title="看地圖"
                                        >
                                            <Icon name="mapPin" size={14}/>
                                        </button>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const DynamicList = ({ title, items, color, onCheck, onAdd, onDelete }) => {
            const [newItem, setNewItem] = useState("");

            const handleAdd = () => {
                if (!newItem.trim()) return;
                onAdd(newItem);
                setNewItem("");
            };

            return (
                <div className="kusama-card bg-white overflow-hidden mb-6">
                    <div className={`${color === 'red' ? 'bg-red-500' : color === 'blue' ? 'bg-blue-600' : 'bg-black'} p-4 border-b-4 border-black`}>
                        <h3 className="text-xl font-black text-white flex items-center gap-2">
                            {title}
                        </h3>
                    </div>
                    <div className="p-4 space-y-3">
                        {/* Input Area */}
                        <div className="flex gap-2 mb-4">
                            <input 
                                type="text" 
                                value={newItem}
                                onChange={(e) => setNewItem(e.target.value)}
                                placeholder="新增項目..."
                                className="kusama-input flex-1 border-2 border-black rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-yellow-400"
                                onKeyPress={(e) => e.key === 'Enter' && handleAdd()}
                            />
                            <button onClick={handleAdd} className="kusama-btn px-4 py-2 rounded-lg text-sm">
                                <Icon name="plus" size={18}/>
                            </button>
                        </div>

                        {/* List Items */}
                        {items.map((item, idx) => (
                            <div key={item.id} className="flex items-start gap-3 group p-2 hover:bg-gray-50 rounded-lg transition-colors">
                                <div className="relative flex items-center pt-1">
                                    <input 
                                        type="checkbox" 
                                        checked={item.checked || false}
                                        onChange={() => onCheck(item.id)}
                                        className="peer h-6 w-6 cursor-pointer appearance-none rounded-md border-2 border-black bg-white transition-all checked:bg-black checked:border-black"
                                    />
                                    <Icon name="check" size={16} className="absolute left-1 top-2 text-[#fbbf24] opacity-0 peer-checked:opacity-100 pointer-events-none"/>
                                </div>
                                <div className="flex-1">
                                    <span className={`text-base font-bold block transition-colors ${item.checked ? 'text-gray-400 line-through' : 'text-black'}`}>
                                        {item.text}
                                    </span>
                                    {item.note && <span className="text-xs font-bold text-gray-500 block mt-0.5">{item.note}</span>}
                                    {item.loc && <span className="inline-block bg-black text-white px-1.5 py-0.5 rounded text-[10px] mt-1">@{item.loc}</span>}
                                </div>
                                <button onClick={() => onDelete(item.id)} className="text-gray-300 hover:text-red-500 p-1">
                                    <Icon name="trash2" size={16}/>
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Main Component ---
        const App = () => {
            const [view, setView] = useState('dashboard');
            const [dayIdx, setDayIdx] = useState(0);
            
            // Modals
            const [diningId, setDiningId] = useState(null);
            const [mapData, setMapData] = useState(null); // { title, query }

            // Firebase Dynamic Data
            const [dynamicData, setDynamicData] = useState({ 
                shoppingHeavy: [], 
                shoppingLight: [], 
                checklist: [],
                notes: {} 
            });
            const [syncStatus, setSyncStatus] = useState('初始化...');

            useLucide();

            // 1. Firebase Sync & Init Logic
            useEffect(() => {
                if (db) {
                    setSyncStatus('連線中...');
                    // Use a unique document ID to ensure clean slate or persistent data
                    const docRef = db.collection('trips').doc('kagawa2025_v5_dynamic_v2'); 

                    const unsubscribe = docRef.onSnapshot((doc) => {
                        if (doc.exists) {
                            // Data exists, load it
                            setDynamicData(doc.data());
                            setSyncStatus('● 已同步');
                        } else {
                            // First time load: Write default data to Firebase
                            console.log("Initializing default data...");
                            docRef.set({
                                shoppingHeavy: defaultDynamicData.shoppingHeavy,
                                shoppingLight: defaultDynamicData.shoppingLight,
                                checklist: defaultDynamicData.checklist,
                                notes: {}
                            }).then(() => setSyncStatus('● 初始化完成'));
                        }
                    }, (err) => {
                        console.error(err);
                        setSyncStatus('✕ 同步失敗');
                    });
                    return () => unsubscribe();
                } else {
                    // Local Storage Fallback
                    setSyncStatus('💾 本機模式');
                    const local = localStorage.getItem('trip_local_dynamic');
                    if (local) {
                        setDynamicData(JSON.parse(local));
                    } else {
                        setDynamicData({
                            shoppingHeavy: defaultDynamicData.shoppingHeavy,
                            shoppingLight: defaultDynamicData.shoppingLight,
                            checklist: defaultDynamicData.checklist,
                            notes: {}
                        });
                    }
                }
            }, []);

            // Helper to update Firebase
            const updateCloud = (newData) => {
                setDynamicData(newData); // Optimistic update
                if (db) {
                    setSyncStatus('儲存中...');
                    db.collection('trips').doc('kagawa2025_v5_dynamic_v2').set(newData, { merge: true })
                        .then(() => setSyncStatus('● 已同步'))
                        .catch(() => setSyncStatus('✕ 儲存失敗'));
                } else {
                    localStorage.setItem('trip_local_dynamic', JSON.stringify(newData));
                }
            };

            // Generic List Handlers
            const handleCheck = (listName, id) => {
                const newList = dynamicData[listName].map(item => 
                    item.id === id ? { ...item, checked: !item.checked } : item
                );
                updateCloud({ ...dynamicData, [listName]: newList });
            };

            const handleAdd = (listName, text) => {
                const newItem = { id: Date.now().toString(), text: text, checked: false };
                const newList = [...dynamicData[listName], newItem];
                updateCloud({ ...dynamicData, [listName]: newList });
            };

            const handleDelete = (listName, id) => {
                const newList = dynamicData[listName].filter(item => item.id !== id);
                updateCloud({ ...dynamicData, [listName]: newList });
            };

            const handleNote = (day, text) => {
                const newNotes = { ...dynamicData.notes, [day]: text };
                setDynamicData(prev => ({ ...prev, notes: newNotes })); // Local update
                
                // Debounce save
                if (window.saveTimer) clearTimeout(window.saveTimer);
                window.saveTimer = setTimeout(() => {
                    updateCloud({ ...dynamicData, notes: newNotes });
                }, 1000);
            };

            // Renderers
            const renderDashboard = () => (
                <div className="animate-fade-in space-y-8">
                    <div className="kusama-card p-8 md:p-12 relative overflow-hidden bg-white">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#fbbf24] rounded-full -mr-16 -mt-16 border-4 border-black"></div>
                        <div className="relative z-10">
                            <h2 className="text-3xl md:text-5xl font-black text-black mb-4 tracking-tighter uppercase">{staticTripData.intro.title}</h2>
                            <h3 className="text-xl md:text-2xl font-bold text-gray-700 mb-6 border-l-8 border-black pl-4">{staticTripData.intro.subtitle}</h3>
                            <p className="text-gray-800 text-lg leading-relaxed max-w-2xl font-medium">{staticTripData.intro.desc}</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {staticTripData.highlights.map((h, idx) => (
                            <div key={idx} className="kusama-card p-6 bg-white hover:bg-yellow-50">
                                <div className="w-12 h-12 rounded-full bg-black text-[#fbbf24] flex items-center justify-center mb-4 border-2 border-[#fbbf24]"><Icon name={h.icon} size={24}/></div>
                                <h4 className="text-lg font-black text-black mb-2">{h.title}</h4>
                                <p className="text-sm text-gray-600 font-bold">{h.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const renderItinerary = () => {
                const day = staticTripData.days[dayIdx];
                return (
                    <div className="animate-fade-in flex flex-col lg:flex-row gap-8">
                        <div className="lg:w-1/4 w-full flex lg:flex-col overflow-x-auto lg:overflow-visible gap-3 pb-2 lg:pb-0">
                            {staticTripData.days.map((d, idx) => (
                                <button key={idx} onClick={() => setDayIdx(idx)} className={`flex-shrink-0 lg:w-full px-6 py-4 rounded-2xl font-black text-left transition-all border-4 ${dayIdx === idx ? 'bg-black text-[#fbbf24] border-black shadow-[4px_4px_0px_0px_#fbbf24] transform -translate-y-1' : 'bg-white text-black border-black hover:bg-gray-100'}`}>
                                    <span className="text-xs opacity-70 block mb-1 uppercase tracking-widest">{d.date.split(" ")[0]}</span>
                                    <span className="text-xl">{d.title.split(" ")[0]}</span>
                                </button>
                            ))}
                        </div>
                        <div className="lg:w-3/4 w-full">
                            <div className="kusama-card p-6 md:p-10 min-h-[60vh] bg-white">
                                <div className="mb-8 border-b-4 border-black pb-6 flex justify-between items-end">
                                    <div>
                                        <h3 className="text-3xl md:text-4xl font-black text-black mb-2">{day.title}</h3>
                                        <div className="inline-block bg-[#fbbf24] border-2 border-black px-3 py-1 rounded-full text-xs font-bold text-black uppercase tracking-wide">{day.date}</div>
                                    </div>
                                    <div className="hidden md:block text-right">
                                        <div className="text-sm font-bold text-gray-500 uppercase">Highlight</div>
                                        <div className="text-lg font-black text-black">{day.highlight}</div>
                                    </div>
                                </div>
                                <div className="space-y-8 relative pl-6">
                                    <div className="absolute left-[23px] top-4 bottom-4 w-1 bg-black opacity-10"></div>
                                    {day.events.map((ev, i) => (
                                        <div key={i} className="relative flex gap-6 items-start group">
                                            <div className={`z-10 w-12 h-12 rounded-full flex items-center justify-center shrink-0 border-4 border-black bg-white group-hover:scale-110 transition-transform ${ev.type === 'critical' ? 'bg-red-500 text-white' : ev.type === 'dining' ? 'bg-[#fbbf24] text-black' : 'text-black'}`}>
                                                <Icon name={ev.icon} size={20}/>
                                            </div>
                                            <div className="flex-1 pt-1">
                                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-2">
                                                    <h4 className={`text-xl font-black ${ev.type === 'critical' ? 'text-red-600' : 'text-black'}`}>{ev.title}</h4>
                                                    <div className="flex items-center gap-2 mt-1 sm:mt-0">
                                                        <span className="font-bold text-sm bg-black text-white px-2 py-0.5 rounded">{ev.time}</span>
                                                        
                                                        {/* Map Button */}
                                                        {ev.mapQuery && (
                                                            <button 
                                                                onClick={() => setMapData({ title: ev.title, query: ev.mapQuery })} 
                                                                className="kusama-btn-icon w-8 h-8"
                                                                title="查看地圖"
                                                            >
                                                                <Icon name="mapPin" size={14}/>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <p className="text-base text-gray-700 font-medium leading-relaxed">{ev.desc}</p>
                                                {ev.type === 'dining' && (
                                                    <button onClick={() => setDiningId(ev.diningId)} className="mt-3 text-sm font-black text-black underline decoration-4 decoration-[#fbbf24] underline-offset-4 hover:decoration-red-500 transition-all flex items-center gap-1">
                                                        查看 3 層備案 <Icon name="chevronDown" size={16}/>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-12 bg-[#fbbf24] p-1 rounded-xl transform rotate-1">
                                    <div className="bg-white p-4 rounded-lg border-2 border-black h-full">
                                        <label className="text-xs font-black text-black uppercase mb-2 block tracking-widest flex items-center gap-2"><Icon name="penTool" size={14}/> {day.date} Memo</label>
                                        <textarea className="w-full bg-transparent text-lg font-bold text-gray-800 placeholder-gray-300 focus:outline-none resize-none" rows="3" placeholder="Write something..." value={dynamicData.notes[day.id] || ''} onChange={(e) => handleNote(day.id, e.target.value)}/>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderShopping = () => (
                <div className="animate-fade-in grid grid-cols-1 md:grid-cols-2 gap-8">
                    <DynamicList 
                        title="Day 2: 重物家電戰 (Rainbow Road)" 
                        color="red"
                        items={dynamicData.shoppingHeavy}
                        onCheck={(id) => handleCheck('shoppingHeavy', id)}
                        onAdd={(text) => handleAdd('shoppingHeavy', text)}
                        onDelete={(id) => handleDelete('shoppingHeavy', id)}
                    />
                    <DynamicList 
                        title="Day 4: 輕物藥妝戰 (瓦町)" 
                        color="blue"
                        items={dynamicData.shoppingLight}
                        onCheck={(id) => handleCheck('shoppingLight', id)}
                        onAdd={(text) => handleAdd('shoppingLight', text)}
                        onDelete={(id) => handleDelete('shoppingLight', id)}
                    />
                </div>
            );

            const renderChecklist = () => (
                <div className="animate-fade-in max-w-2xl mx-auto">
                    <DynamicList 
                        title="行前 & 關鍵行動清單" 
                        color="green"
                        items={dynamicData.checklist}
                        onCheck={(id) => handleCheck('checklist', id)}
                        onAdd={(text) => handleAdd('checklist', text)}
                        onDelete={(id) => handleDelete('checklist', id)}
                    />
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col pb-24 md:pb-0">
                    <div className="bg-black text-white px-4 py-3 sticky top-0 z-50 shadow-md">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-lg md:text-xl font-black flex items-center gap-2 tracking-wider">
                                <span className="text-[#fbbf24] text-2xl">●</span> KAGAWA <span className="text-[#fbbf24]">V5.0+</span>
                            </h1>
                            <div className="flex items-center gap-4">
                                <span className={`text-xs font-bold px-3 py-1 rounded-full ${syncStatus.includes('同步') ? 'bg-green-500 text-white' : 'bg-gray-700 text-gray-300'}`}>{syncStatus}</span>
                                <div className="hidden md:flex gap-2">
                                    {[
                                        { id: 'dashboard', icon: 'layoutDashboard', label: '戰情室' },
                                        { id: 'itinerary', icon: 'map', label: '每日行程' },
                                        { id: 'shopping', icon: 'shoppingBag', label: '購物戰略' },
                                        { id: 'checklist', icon: 'checkSquare', label: '檢查表' },
                                    ].map(tab => (
                                        <button key={tab.id} onClick={() => setView(tab.id)} className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2 ${view === tab.id ? 'bg-[#fbbf24] text-black' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                                            <Icon name={tab.icon} size={16}/> {tab.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
                        {view === 'dashboard' && renderDashboard()}
                        {view === 'itinerary' && renderItinerary()}
                        {view === 'shopping' && renderShopping()}
                        {view === 'checklist' && renderChecklist()}
                    </div>

                    <div className="md:hidden fixed bottom-0 w-full bg-black border-t-4 border-[#fbbf24] flex justify-around py-3 pb-safe z-40">
                        {[
                            { id: 'dashboard', icon: 'layoutDashboard', label: '總覽' },
                            { id: 'itinerary', icon: 'map', label: '行程' },
                            { id: 'shopping', icon: 'shoppingBag', label: '購物' },
                            { id: 'checklist', icon: 'checkSquare', label: '清單' },
                        ].map(tab => (
                            <button key={tab.id} onClick={() => setView(tab.id)} className={`flex flex-col items-center gap-1 ${view === tab.id ? 'text-[#fbbf24]' : 'text-gray-500'}`}>
                                <Icon name={tab.icon} size={24} />
                                <span className="text-[10px] font-black tracking-wide">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    <DiningModal diningId={diningId} options={staticTripData.diningOptions} onClose={() => setDiningId(null)} onMapClick={(title, query) => setMapData({title, query})} />
                    <MapModal title={mapData?.title} query={mapData?.query} onClose={() => setMapData(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
