        // --- Main Component ---

            const [dayIdx, setDayIdx] = useState(0);
            const [diningId, setDiningId] = useState(null);

            const [syncStatus, setSyncStatus] = useState('初始化...');

            useLucide();

            // Firebase Sync Logic
            useEffect(() => {
                if (db) {
                    setSyncStatus('連線中...');
                    const unsubscribe = db.collection('trips').doc('kagawa2025_v5_plus').onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.notes) setUserNotes(data.notes);
                            if (data.checkedItems) setCheckedItems(data.checkedItems);
                            setSyncStatus('☁️ 已同步');
                        } else {
                            // Create doc if not exists
                            db.collection('trips').doc('kagawa2025_v5_plus').set({ notes: {}, checkedItems: {} });
                            setSyncStatus('☁️ 新建立');
                        }
                    }, (err) => {
                        console.error(err);
                        setSyncStatus('❌ 同步失敗');
                    });
                    return () => unsubscribe();
                } else {
                    setSyncStatus('💾 本機模式');
                    const localData = localStorage.getItem('trip_local_v5');
                    if (localData) {
                        const parsed = JSON.parse(localData);
                        setUserNotes(parsed.notes || {});
                        setCheckedItems(parsed.checkedItems || {});
                    }
                }
            }, []);

                if (db) {
                    setSyncStatus('儲存中...');
                    db.collection('trips').doc('kagawa2025_v5_plus').set({
                        notes: notes,
                        checkedItems: checks
                    }, { merge: true }).then(() => setSyncStatus('☁️ 已同步'));

                    localStorage.setItem('trip_local_v5', JSON.stringify({ notes, checkedItems: checks }));
                }
            };

                const newChecks = { ...checkedItems, [id]: !checkedItems[id] };
                setCheckedItems(newChecks);
                saveToCloud(userNotes, newChecks);
            };

            const handleNote = (day, text) => {
                const newNotes = { ...userNotes, [day]: text };
                setUserNotes(newNotes);
                // Debounce save
                if (window.saveTimer) clearTimeout(window.saveTimer);
                window.saveTimer = setTimeout(() => saveToCloud(newNotes, checkedItems), 1000);
            };

            // Views
            const renderDashboard = () => (

                    </div>

                            <div className="font-bold text-slate-700 text-sm">購物戰略</div>
                        </div>
                        <div className="bg-green-50 p-4 rounded-xl text-center" onClick={() => setView('checklist')}>
                            <div className="text-2xl mb-1">✅</div>
                            <div className="font-bold text-slate-700 text-sm">行前清單</div>
                        </div>
                        <div className="bg-slate-50 p-4 rounded-xl text-center">
                            <div className="text-2xl mb-1">📊</div>
                            <div className="font-bold text-slate-700 text-sm">{syncStatus}</div>
                        </div>
                    </div>
                </div>
            );

            const renderItinerary = () => {
                const day = tripData.days[dayIdx];
                return (
                    <div className="animate-fade-in">
                        {/* Day Tabs */}
                        <div className="flex overflow-x-auto gap-2 mb-6 pb-2 scrollbar-hide">
                            {tripData.days.map((d, idx) => (
                                <button 
                                    key={idx}
                                    onClick={() => setDayIdx(idx)}
                                    className={`flex-shrink-0 px-4 py-2 rounded-lg text-sm font-bold transition-all border ${
                                        dayIdx === idx 
                                        ? `bg-slate-800 text-white border-slate-800 shadow-md transform -translate-y-0.5` 
                                        : 'bg-white text-slate-500 border-slate-200'
                                    }`}
                                >
                                    {d.date.split(" ")[0]}
                                </button>
                            ))}
                        </div>

                        {/* Timeline */}
                        <div className="bg-white rounded-2xl shadow-sm p-5 border border-slate-100 min-h-[50vh]">
                            <div className="mb-6">
                                <h3 className={`text-xl font-black ${day.color.replace('bg-', 'text-')}`}>{day.title}</h3>
                                <p className="text-xs text-slate-400 font-medium mt-1">{day.date} · {day.highlight}</p>
                            </div>

                            <div className="space-y-6 relative pl-4">
                                <div className="absolute left-[19px] top-2 bottom-2 w-0.5 bg-slate-100"></div>
                                {day.events.map((ev, i) => (
                                    <div key={i} className="relative flex gap-4 items-start">
                                        <div className={`z-10 w-10 h-10 rounded-full flex items-center justify-center shrink-0 shadow-sm border-2 border-white ${
                                            ev.type === 'critical' ? 'bg-red-100 text-red-600' : 
                                            ev.type === 'dining' ? 'bg-orange-100 text-orange-600' : 
                                            'bg-slate-100 text-slate-500'
                                        }`}>
                                            <Icon name={ev.icon} size={18}/>
                                        </div>
                                        <div className="flex-1 pt-1">
                                            <div className="flex justify-between items-start">
                                                <span className="text-xs font-bold text-slate-400 bg-slate-50 px-1.5 py-0.5 rounded">{ev.time}</span>
                                                {ev.mapQuery && (
                                                    <button onClick={() => openMap(ev.mapQuery)} className="text-blue-400 hover:text-blue-600 p-1">
                                                        <Icon name="mapPin" size={16}/>
                                                    </button>
                                                )}
                                            </div>
                                            <h4 className={`text-sm font-bold mt-1 ${ev.type === 'critical' ? 'text-red-700' : 'text-slate-800'}`}>
                                                {ev.title}
                                            </h4>
                                            <p className="text-xs text-slate-500 leading-relaxed mt-1">{ev.desc}</p>
                                            
                                            {ev.type === 'dining' && (
                                                <button 
                                                    onClick={() => setDiningId(ev.diningId)}
                                                    className="mt-2 text-xs font-bold text-orange-600 bg-orange-50 px-2 py-1 rounded hover:bg-orange-100 transition-colors flex items-center gap-1"
                                                >
                                                    <Icon name="chevronDown" size={12}/> 查看 3 層備案
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Daily Note */}
                            <div className="mt-8 pt-6 border-t border-dashed border-slate-200">
                                <label className="text-xs font-bold text-slate-400 mb-2 flex items-center gap-1">
                                    <Icon name="edit3" size={12}/> {day.date} 隨手記
                                </label>
                                <textarea 
                                    className="w-full bg-yellow-50/50 rounded-xl p-3 text-sm text-slate-700 focus:ring-2 focus:ring-yellow-400 outline-none border border-yellow-100 resize-none placeholder-slate-300"
                                    rows="3"
                                    placeholder="紀錄花費、心情..."
                                    value={userNotes[day.id] || ''}
                                    onChange={(e) => handleNote(day.id, e.target.value)}
                                />
                            </div>
                        </div>
                    </div>
                );
            };

            const renderShopping = () => (
                <div className="space-y-6 animate-fade-in">
                    {/* Heavy List */}
                    <div className="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
                        <div className="bg-red-50 p-4 border-b border-red-100">
                            <h3 className="font-bold text-red-800 flex items-center gap-2">
                                <Icon name="weight" size={18}/> Day 2: 重物家電戰
                            </h3>
                            <p className="text-xs text-red-600 mt-1">Rainbow Road (DCM/Yamada) · 計程車往返</p>
                        </div>
                        <div className="p-4 space-y-3">
                            {tripData.shoppingHeavy.map((item, idx) => (
                                <label key={idx} className="flex items-start gap-3 cursor-pointer group">
                                    <input 
                                        type="checkbox" 
                                        checked={checkedItems[item.id] || false}
                                        onChange={() => handleCheck(item.id)}
                                        className="mt-1 w-4 h-4 rounded text-red-600 focus:ring-red-500 border-slate-300"
                                    />
                                    <div>
                                        <span className={`text-sm font-medium block transition-colors ${checkedItems[item.id] ? 'text-slate-400 line-through' : 'text-slate-700 group-hover:text-red-700'}`}>
                                            {item.item}
                                        </span>
                                        <span className="text-xs text-slate-400 block">{item.note} @{item.loc}</span>
                                    </div>
                                </label>
                            ))}
                        </div>
                    </div>

                    {/* Light List */}
                    <div className="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-200">
                        <div className="bg-blue-50 p-4 border-b border-blue-100">
                            <h3 className="font-bold text-blue-800 flex items-center gap-2">
                                <Icon name="feather" size={18}/> Day 4: 輕物藥妝戰
                            </h3>
                            <p className="text-xs text-blue-600 mt-1">瓦町 & 商店街 · 步行</p>
                        </div>
                        <div className="p-4 space-y-3">
                            {tripData.shoppingLight.map((item, idx) => (
                                <label key={idx} className="flex items-start gap-3 cursor-pointer group">
                                    <input 
                                        type="checkbox" 
                                        checked={checkedItems[item.id] || false}
                                        onChange={() => handleCheck(item.id)}
                                        className="mt-1 w-4 h-4 rounded text-blue-600 focus:ring-blue-500 border-slate-300"
                                    />
                                    <div>
                                        <span className={`text-sm font-medium block transition-colors ${checkedItems[item.id] ? 'text-slate-400 line-through' : 'text-slate-700 group-hover:text-blue-700'}`}>
                                            {item.item}
                                        </span>
                                        <span className="text-xs text-slate-400 block">{item.note} @{item.loc}</span>
                                    </div>
                                </label>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderChecklist = () => (
                <div className="bg-white rounded-xl shadow-sm p-6 border border-slate-200 animate-fade-in">
                    <h2 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <Icon name="checkCircle" className="text-green-500"/> 行前 & 關鍵行動
                    </h2>
                    <div className="space-y-4">
                        {tripData.checklist.map((item, idx) => (
                            <label key={idx} className="flex items-center gap-3 p-3 bg-slate-50 rounded-lg hover:bg-slate-100 transition-colors cursor-pointer">
                                <input 
                                    type="checkbox" 
                                    checked={checkedItems[`chk_${idx}`] || false}
                                    onChange={() => handleCheck(`chk_${idx}`)}
                                    className="w-5 h-5 text-green-600 rounded focus:ring-green-500 border-slate-300"
                                />
                                <span className={`text-sm font-medium ${checkedItems[`chk_${idx}`] ? 'text-slate-400 line-through' : 'text-slate-700'}`}>
                                    {item}
                                </span>
                            </label>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-20">
                    {/* Header */}
                    <div className="bg-white p-4 shadow-sm sticky top-0 z-30 flex justify-between items-center">
                        <h1 className="text-lg font-black text-slate-800 flex items-center gap-2">
                            🇯🇵 瀨戶內海戰情室
                        </h1>
                        <span className={`text-[10px] px-2 py-0.5 rounded-full font-bold ${syncStatus.includes('同步') ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-500'}`}>
                            {syncStatus}
                        </span>
                    </div>

                    {/* Content */}
                    <div className="flex-1 p-4 overflow-y-auto">
                        {view === 'dashboard' && renderDashboard()}
                        {view === 'itinerary' && renderItinerary()}
                        {view === 'shopping' && renderShopping()}
                        {view === 'checklist' && renderChecklist()}
                    </div>

                    {/* Bottom Nav */}
                    <div className="fixed bottom-0 w-full max-w-md bg-white border-t border-slate-200 flex justify-around py-3 pb-safe z-40">
                        {[
                            { id: 'dashboard', icon: 'layoutDashboard', label: '總覽' },
                            { id: 'itinerary', icon: 'map', label: '行程' },
                            { id: 'shopping', icon: 'shoppingBag', label: '購物' },
                            { id: 'checklist', icon: 'checkSquare', label: '清單' },
                        ].map(tab => (
                            <button 
                                key={tab.id}
                                onClick={() => setView(tab.id)}
                                className={`flex flex-col items-center gap-1 ${view === tab.id ? 'text-blue-600' : 'text-slate-400'}`}
                            >
                                <Icon name={tab.icon} size={20} />
                                <span className="text-[10px] font-bold">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Modals */}
                    <DiningModal 
                        diningId={diningId} 
                        options={tripData.diningOptions} 
                        onClose={() => setDiningId(null)} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
