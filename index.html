<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瀨戶內海冬季任務指揮中心 V5.0</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        //  Firebase 設定 (已預填您的專案 ID)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAv5IijFahAASxqHpoIrrFVcroLV9WExD4",
            authDomain: "takamatsu-trip-2025.firebaseapp.com",
            projectId: "takamatsu-trip-2025",
            storageBucket: "takamatsu-trip-2025.firebasestorage.app",
            messagingSenderId: "181003622268",
            appId: "1:181003622268:web:51e386ce854cd1ddbfb6f9"
        };

        let db = null;
        if (firebaseConfig.projectId) {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
            } catch (e) {
                console.error("Firebase init failed:", e);
            }
        }

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconName = name.charAt(0).toLowerCase() + name.slice(1);
            return <i data-lucide={iconName} className={className} style={{ width: size, height: size, display: 'inline-block', verticalAlign: 'middle' }}></i>;
        };

        const useLucide = () => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
        };

        // 餐飲選項組件
        const DiningOptions = ({ title, options, icon }) => {
            const [isOpen, setIsOpen] = useState(false);
            return (
                <div className="mt-2 mb-2">
                    <button 
                        onClick={() => setIsOpen(!isOpen)}
                        className="w-full text-left bg-orange-50 hover:bg-orange-100 border border-orange-200 rounded-lg p-3 flex justify-between items-center transition-colors"
                    >
                        <span className="font-bold text-orange-800 text-sm flex items-center gap-2">
                            <Icon name={icon || "utensils"} size={16}/> {title}
                        </span>
                        <Icon name={isOpen ? "chevronUp" : "chevronDown"} size={16} className="text-orange-400"/>
                    </button>
                    {isOpen && (
                        <div className="bg-white border-x border-b border-orange-200 rounded-b-lg p-3 space-y-2 animate-fade-in-up">
                            {options.map((opt, idx) => (
                                <div key={idx} className="text-xs text-gray-700 pb-2 border-b border-gray-100 last:border-0 last:pb-0">
                                    <strong className="text-orange-700 block mb-1">選項 {idx + 1}: {opt.name}</strong>
                                    <p>{opt.desc}</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ShoppingList = ({ items, checkedState, onCheck, title, color }) => (
            <div className={`rounded-xl p-4 border mt-4 ${color === 'red' ? 'bg-red-50 border-red-200' : 'bg-blue-50 border-blue-200'}`}>
                <h4 className={`font-bold flex items-center gap-2 mb-2 ${color === 'red' ? 'text-red-800' : 'text-blue-800'}`}>
                    <Icon name="shoppingCart" size={18}/> {title}
                </h4>
                <div className="space-y-2">
                    {items.map((item, idx) => (
                        <label key={idx} className="flex items-start gap-2 cursor-pointer group">
                            <input 
                                type="checkbox" 
                                checked={checkedState[item.id] || false}
                                onChange={() => onCheck(item.id)}
                                className={`mt-1 rounded focus:ring-2 ${color === 'red' ? 'text-red-600 focus:ring-red-500' : 'text-blue-600 focus:ring-blue-500'}`}
                            />
                            <span className={`text-sm transition-all ${checkedState[item.id] ? 'text-gray-400 line-through' : 'text-gray-700 group-hover:text-black'}`}>
                                {item.text}
                            </span>
                        </label>
                    ))}
                </div>
            </div>
        );

        const TripPlanner = () => {
            const [activeTab, setActiveTab] = useState(0);
            const [data, setData] = useState({ notes: {}, checkedItems: {} });
            const [syncStatus, setSyncStatus] = useState(db ? '連線中...' : '本機模式');
            const [showMap, setShowMap] = useState(false);
            const [currentMapUrl, setCurrentMapUrl] = useState('');
            const [currentMapTitle, setCurrentMapTitle] = useState('');

            useLucide();

            useEffect(() => {
                if (db) {
                    const unsubscribe = db.collection('trips').doc('kagawa2025_v5').onSnapshot((doc) => {
                        if (doc.exists) {
                            setData(doc.data());
                            setSyncStatus('已同步');
                        } else {
                            db.collection('trips').doc('kagawa2025_v5').set({ notes: {}, checkedItems: {} });
                        }
                    }, () => setSyncStatus('同步失敗'));
                    return () => unsubscribe();
                } else {
                    const localData = localStorage.getItem('trip_data_v5');
                    if (localData) setData(JSON.parse(localData));
                }
            }, []);

            const updateData = (newData) => {
                setData(newData);
                if (db) {
                    setSyncStatus('儲存中...');
                    db.collection('trips').doc('kagawa2025_v5').set(newData, { merge: true })
                        .then(() => setSyncStatus('已同步'))
                        .catch(() => setSyncStatus('儲存失敗'));
                } else {
                    localStorage.setItem('trip_data_v5', JSON.stringify(newData));
                }
            };

            const handleCheck = (id) => {
                const newChecked = { ...data.checkedItems, [id]: !data.checkedItems[id] };
                updateData({ ...data, checkedItems: newChecked });
            };

            const handleNoteChange = (dayIndex, text) => {
                const newNotes = { ...data.notes, [dayIndex]: text };
                setData(prev => ({ ...prev, notes: newNotes }));
                if (window.saveTimeout) clearTimeout(window.saveTimeout);
                window.saveTimeout = setTimeout(() => {
                    updateData({ ...data, notes: newNotes });
                }, 1000);
            };

            const getEmbedUrl = (query) => `https://maps.google.com/maps?q=${encodeURIComponent(query)}&t=&z=13&ie=UTF8&iwloc=&output=embed`;
            const openMap = (title, query) => {
                setCurrentMapTitle(title);
                setCurrentMapUrl(getEmbedUrl(query));
                setShowMap(true);
            };

            // V5.0 Data Structure
            const itinerary = [
                {
                    day: "Day 1", date: "12/25 (四)", theme: "啟程與溫泉", color: "bg-blue-600",
                    highlight: "06:20 出發 · 領取優惠券 · 琴平溫泉",
                    details: [
                        { time: "06:20", icon: "home", text: "家門啟程 (預約計程車) → 台中機場", mapQuery: "433臺中市沙鹿區東海路53-1號" },
                        { time: "06:50", icon: "ticket", text: "【關鍵】星宇櫃檯領取香川優惠券包" },
                        { time: "12:20", icon: "plane", text: "抵達高松 (午餐建議: 全家炸雞君/讚岐麵業)", mapQuery: "高松機場" },
                        { time: "13:00", icon: "bus", text: "機場巴士 (琴平線) 直達飯店", mapQuery: "高松機場 to 琴平巴士總站" },
                        { time: "15:00", icon: "moon", text: "入住琴參閣，享受展望風呂", mapQuery: "ことひら温泉 琴参閣" },
                        { type: "dining", title: "晚餐：琴平溫泉街", options: [
                            {name: "骨付鳥 一鶴", desc: "步行5分。香川必吃，推薦老雞與嫩雞，預算3000日圓。"},
                            {name: "田中屋 (居酒屋)", desc: "步行8分。表參道口，生魚片與關東煮，預算4000日圓。"},
                            {name: "琴參閣懷石", desc: "飯店內。需預約，舒適免出門，預算6000+日圓。"}
                        ]}
                    ],
                    shopping: []
                },
                {
                    day: "Day 2", date: "12/26 (五)", theme: "文化與家電防災", color: "bg-amber-600",
                    highlight: "神椿下午茶 · Rainbow Road 重物採買",
                    details: [
                        { time: "10:00", icon: "sun", text: "金刀比羅宮散策 (目標500階)", mapQuery: "金刀比羅宮" },
                        { type: "dining", title: "午餐：神椿或周邊", options: [
                            {name: "神椿 (Kamitsubaki)", desc: "500階處。資生堂聖代與漢堡排，氣氛優雅。"},
                            {name: "虎屋 (Toraya)", desc: "表參道口。400年老宅烏龍麵，氣氛佳。"},
                            {name: "金刀比羅烏龍麵", desc: "表參道上。醬油烏龍麵名店。"}
                        ]},
                        { time: "13:30", icon: "train", text: "琴電移動至高松 (入住 Super Hotel)", mapQuery: "スーパーホテル高松禁煙館" },
                        { time: "15:30", icon: "shoppingBag", text: "【重點】搭計程車至 Rainbow Road 採買", mapQuery: "Yamada Denki Tecc Land Takamatsu Rainbow" },
                        { type: "dining", title: "晚餐：高松市區", options: [
                            {name: "骨付鳥 蘭丸", desc: "瓦町步行10分。排隊名店，除了雞肉也有生魚片。"},
                            {name: "川福 本店", desc: "Lions通。老牌烏龍麵，適合晚餐。"},
                            {name: "達摩屋 (拉麵)", desc: "瓦町附近。深夜食堂風格，炒飯好吃。"}
                        ]}
                    ],
                    shoppingTitle: "Rainbow Road 戰利品 (重物)",
                    shoppingColor: "red",
                    shopping: [
                        { id: "s2-1", text: "吸頂燈 (Panasonic/NEC ~6畳, 調光調色, 遙控)" },
                        { id: "s2-2", text: "防災水 & 非常食 (DCM Home Center)" },
                        { id: "s2-3", text: "手搖發電收音機/手電筒 (DCM)" },
                        { id: "s2-4", text: "大型收納用品 (Daiso)" }
                    ]
                },
                {
                    day: "Day 3", date: "12/27 (六)", theme: "小豆島公車遊", color: "bg-green-600",
                    highlight: "橄欖公園 · 天使之路 (乾潮15:30)",
                    details: [
                        { time: "09:00", icon: "ship", text: "高松港搭渡輪 → 土庄港 (60分)", mapQuery: "高松港" },
                        { time: "10:30", icon: "bus", text: "橄欖巴士 → 橄欖公園 (風車拍照)", mapQuery: "道の駅 小豆島オリーブ公園" },
                        { type: "dining", title: "午餐：橄欖公園內", options: [
                            {name: "Sun Olive", desc: "景觀餐廳。橄欖油義大利麵、漢堡排。"},
                            {name: "Olivaz", desc: "輕食咖啡廳。披薩與柑橘飲品。"},
                            {name: "小賣店外帶", desc: "熱狗與橄欖霜淇淋，草地野餐。"}
                        ]},
                        { time: "14:00", icon: "camera", text: "天使之路 (搭公車至國際飯店站)", mapQuery: "エンジェルロード" },
                        { time: "17:30", icon: "ship", text: "返回高松港", mapQuery: "高松港" },
                        { type: "dining", title: "晚餐：高松港/兵庫町", options: [
                            {name: "寄鳥味鳥", desc: "兵庫町。在地人愛的骨付鳥，香料味重。"},
                            {name: "海鮮食堂 OKIDO", desc: "批發市場直送，高CP值定食。"},
                            {name: "德島拉麵 麵王", desc: "高松站前。濃郁豚骨生蛋拉麵。"}
                        ]}
                    ],
                    shopping: []
                },
                {
                    day: "Day 4", date: "12/28 (日)", theme: "名園與藥妝", color: "bg-pink-600",
                    highlight: "栗林公園深度遊 · 瓦町購物馬拉松",
                    details: [
                        { time: "10:00", icon: "flower", text: "栗林公園 (和船預約 & 掬月亭抹茶)", mapQuery: "掬月亭" },
                        { type: "dining", title: "午餐：栗林公園周邊", options: [
                            {name: "上原屋本店", desc: "公園對面。必吃自助式燙麵(Tebo)體驗。"},
                            {name: "Garden Cafe 栗林", desc: "園區內讚岐物產館。簡單定食。"},
                            {name: "松下製麵所", desc: "步行10分。孤獨的美食家風格老店。"}
                        ]},
                        { time: "14:30", icon: "shoppingBag", text: "【輕物採買】瓦町 FLAG & 商店街", mapQuery: "瓦町FLAG" },
                        { type: "dining", title: "晚餐：慶功宴", options: [
                            {name: "和牛 Ichiie", desc: "瓦町附近。高品質讚岐橄欖牛燒肉。"},
                            {name: "壽司割烹 魚夏", desc: "瓦町老字號。安靜享受瀨戶內海壽司。"},
                            {name: "Grill & 洋食 Arigato", desc: "丸龜町。溫馨好吃的日式漢堡排。"}
                        ]}
                    ],
                    shoppingTitle: "瓦町/商店街 戰利品 (輕物)",
                    shoppingColor: "blue",
                    shopping: [
                        { id: "s4-1", text: "3Coins 質感收納 (瓦町FLAG)" },
                        { id: "s4-2", text: "DHC 營養品 (大國藥妝)" },
                        { id: "s4-3", text: "美妝保養品 (大國/松本清)" },
                        { id: "s4-4", text: "唐吉訶德 防災補貨/零食" }
                    ]
                },
                {
                    day: "Day 5", date: "12/29 (一)", theme: "職人早餐歸途", color: "bg-purple-600",
                    highlight: "傻瓜一代烏龍麵 · 機場最後衝刺",
                    details: [
                        { time: "06:00", icon: "utensils", text: "早餐：手打十段 傻瓜一代 (釜奶油烏龍麵)", mapQuery: "手打十段 うどんバカ一代" },
                        { time: "09:00", icon: "package", text: "打包行李 (確認吸頂燈保護良好)" },
                        { time: "11:00", icon: "bus", text: "瓦町搭乘機場巴士 (使用回程券)", mapQuery: "瓦町駅" },
                        { time: "13:20", icon: "plane", text: "星宇 JX301 返台 -> 15:40 抵達台中", mapQuery: "臺中國際機場" },
                        { time: "16:10", icon: "home", text: "預約車接送返回沙鹿甜蜜的家" }
                    ],
                    shopping: []
                }
            ];

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-24 font-sans text-gray-800">
                    {/* Header */}
                    <div className="bg-white p-5 shadow-sm sticky top-0 z-20">
                        <div className="flex justify-between items-center mb-1">
                            <h1 className="text-xl font-black text-gray-900 flex items-center gap-2">
                                <Icon name="map" className="text-blue-600"/> 瀨戶內海戰情室
                            </h1>
                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${syncStatus === '已同步' ? 'bg-green-50 border-green-200 text-green-700' : 'bg-gray-100 border-gray-200 text-gray-500'}`}>
                                {syncStatus}
                            </span>
                        </div>
                        <p className="text-xs text-gray-500 font-medium">V5.0 最終執行版 · 2025/12/25 - 29</p>
                    </div>

                    <div className="p-4">
                        {/* Stats */}
                        <div className="bg-white rounded-2xl shadow-sm p-4 mb-5 border border-gray-100">
                            <h2 className="text-xs font-bold text-gray-500 mb-2 uppercase tracking-wide">Trip Focus</h2>
                            <div className="flex gap-1 h-2 rounded-full overflow-hidden mb-2">
                                <div className="bg-blue-500 w-[40%]"></div>
                                <div className="bg-amber-500 w-[30%]"></div>
                                <div className="bg-green-500 w-[30%]"></div>
                            </div>
                            <div className="flex justify-between text-xs font-bold">
                                <span className="text-blue-600">觀光 40%</span>
                                <span className="text-amber-600">購物 30%</span>
                                <span className="text-green-600">美食 30%</span>
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="flex overflow-x-auto gap-2 mb-5 pb-1 scrollbar-hide">
                            {itinerary.map((item, idx) => (
                                <button 
                                    key={idx}
                                    onClick={() => setActiveTab(idx)}
                                    className={`flex-shrink-0 px-4 py-2 rounded-xl text-sm font-bold transition-all border-b-4 ${activeTab === idx ? `${item.color} text-white border-black/20 shadow-lg transform -translate-y-0.5` : 'bg-white text-gray-500 border-transparent hover:bg-gray-50'}`}
                                >
                                    {item.day}
                                </button>
                            ))}
                        </div>

                        {/* Content Card */}
                        <div className="bg-white rounded-3xl shadow-lg p-5 border border-gray-100 animate-fade-in-up min-h-[50vh]">
                            <div className="mb-6">
                                <h3 className={`text-2xl font-black ${itinerary[activeTab].color.replace('bg-', 'text-')} mb-1`}>{itinerary[activeTab].theme}</h3>
                                <p className="text-sm font-medium text-gray-400">{itinerary[activeTab].date}</p>
                                <div className="mt-3 bg-gray-50 p-3 rounded-xl text-xs font-bold text-gray-600 border border-gray-100">
                                    ✨ {itinerary[activeTab].highlight}
                                </div>
                            </div>

                            {/* Timeline */}
                            <div className="space-y-6 relative pl-3">
                                <div className="absolute left-[15px] top-3 bottom-3 w-0.5 bg-gray-100"></div>
                                {itinerary[activeTab].details.map((detail, i) => (
                                    <div key={i} className="relative">
                                        {detail.type === 'dining' ? (
                                            <div className="pl-10">
                                                <DiningOptions title={detail.title} options={detail.options} />
                                            </div>
                                        ) : (
                                            <div className="flex gap-4 items-start group">
                                                <div className={`z-10 w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${activeTab === 0 ? 'bg-blue-100 text-blue-600' : 'bg-gray-100 text-gray-500 group-hover:bg-gray-200'} shadow-sm border-2 border-white`}>
                                                    <Icon name={detail.icon} size={14}/>
                                                </div>
                                                <div className="flex-1 pt-1">
                                                    <div className="flex justify-between items-start">
                                                        <span className="text-xs font-bold text-gray-400 bg-gray-50 px-1.5 py-0.5 rounded">{detail.time}</span>
                                                        {detail.mapQuery && (
                                                            <button onClick={() => openMap(detail.text, detail.mapQuery)} className="text-blue-400 hover:text-blue-600">
                                                                <Icon name="mapPin" size={16}/>
                                                            </button>
                                                        )}
                                                    </div>
                                                    <p className="text-sm font-bold text-gray-800 mt-1 leading-snug">{detail.text}</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                            {/* Shopping List (If any) */}
                            {itinerary[activeTab].shopping && itinerary[activeTab].shopping.length > 0 && (
                                <ShoppingList 
                                    title={itinerary[activeTab].shoppingTitle || "今日購物清單"}
                                    color={itinerary[activeTab].shoppingColor}
                                    items={itinerary[activeTab].shopping} 
                                    checkedState={data.checkedItems}
                                    onCheck={handleCheck}
                                />
                            )}

                            {/* Notes */}
                            <div className="mt-8 pt-6 border-t border-dashed border-gray-200">
                                <label className="text-xs font-bold text-gray-400 mb-2 flex items-center gap-1">
                                    <Icon name="edit3" size={12}/> 
                                    {itinerary[activeTab].day} 隨手記
                                </label>
                                <textarea 
                                    className="w-full bg-yellow-50/50 rounded-xl p-4 text-sm text-gray-700 focus:ring-2 focus:ring-yellow-400 outline-none border border-yellow-100 resize-none"
                                    rows="4"
                                    placeholder="紀錄花費、心情或備忘..."
                                    value={data.notes[activeTab] || ''}
                                    onChange={(e) => handleNoteChange(activeTab, e.target.value)}
                                />
                            </div>
                        </div>
                    </div>

                    {/* Map Modal */}
                    {showMap && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl w-full max-w-lg h-[70vh] flex flex-col overflow-hidden shadow-2xl animate-fade-in-up">
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold truncate pr-4 text-gray-800 flex items-center gap-2">
                                        <Icon name="mapPin" className="text-red-500" size={16}/>
                                        {currentMapTitle}
                                    </h3>
                                    <button onClick={() => setShowMap(false)} className="p-1 hover:bg-gray-200 rounded-full"><Icon name="x" size={20}/></button>
                                </div>
                                <iframe src={currentMapUrl} className="flex-1 w-full bg-gray-100" frameBorder="0"></iframe>
                                <div className="p-4 bg-white border-t text-center">
                                    <a href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentMapTitle)}`} target="_blank" className="inline-flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-full font-bold text-sm shadow-lg hover:bg-blue-700 transition-all">
                                        <Icon name="externalLink" size={16}/>
                                        在 Google Maps 開啟
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripPlanner />);
    </script>
</body>
</html>
