<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瀨戶內海冬季任務指揮中心 (雲端同步版)</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (模組化版本相容腳本) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fade-in-up 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        //  請在這裡貼上您的 Firebase Config
        // ==========================================
        const firebaseConfig = {
            // 請取代下方的範例內容
            apiKey: "AIzaSyAv5IijFahAASxqHpoIrrFVcroLV9WExD4",
            authDomain: "takamatsu-trip-2025.firebaseapp.com",
            projectId: "takamatsu-trip-2025",
            storageBucket: "takamatsu-trip-2025.firebasestorage.app",
            messagingSenderId: "181003622268",
            appId: "1:181003622268:web:51e386ce854cd1ddbfb6f9"
        };
        // ==========================================

        // 初始化 Firebase (如果有設定的話)
        let db = null;
        if (firebaseConfig.projectId) {
            try {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                console.log("Firebase initialized successfully");
            } catch (e) {
                console.error("Firebase init failed:", e);
            }
        }

        const Icon = ({ name, size = 24, className = "" }) => {
            const iconName = name.charAt(0).toLowerCase() + name.slice(1);
            return <i data-lucide={iconName} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
        };

        const useLucide = () => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            });
        };

        const TripPlanner = () => {
            const [activeTab, setActiveTab] = useState(0);
            
            // 雲端同步的資料狀態
            const [notes, setNotes] = useState({ 0: '', 1: '', 2: '', 3: '', 4: '' });
            const [checkedItems, setCheckedItems] = useState({});
            const [syncStatus, setSyncStatus] = useState(db ? '連線中...' : '本機模式');
            
            const [showMap, setShowMap] = useState(false);
            const [currentMapUrl, setCurrentMapUrl] = useState('');
            const [currentMapTitle, setCurrentMapTitle] = useState('');

            useLucide();

            // 1. 初始化讀取資料 (從 Firebase 或 LocalStorage)
            useEffect(() => {
                if (db) {
                    // 監聽 Firebase 變更 (Real-time)
                    const unsubscribe = db.collection('trips').doc('kagawa2025').onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.notes) setNotes(data.notes);
                            if (data.checkedItems) setCheckedItems(data.checkedItems);
                            setSyncStatus('已同步');
                        } else {
                            // 如果雲端沒資料，建立預設值
                            db.collection('trips').doc('kagawa2025').set({
                                notes: { 0: '', 1: '', 2: '', 3: '', 4: '' },
                                checkedItems: {}
                            });
                        }
                    }, (error) => {
                        console.error("Sync error:", error);
                        setSyncStatus('同步失敗');
                    });
                    return () => unsubscribe();
                } else {
                    // Fallback: 讀取 LocalStorage
                    const savedNotes = localStorage.getItem('trip_notes');
                    const savedChecks = localStorage.getItem('trip_checks');
                    if (savedNotes) setNotes(JSON.parse(savedNotes));
                    if (savedChecks) setCheckedItems(JSON.parse(savedChecks));
                }
            }, []);

            // 2. 處理資料更新並寫入
            const handleCheck = (id) => {
                const newChecks = { ...checkedItems, [id]: !checkedItems[id] };
                setCheckedItems(newChecks);
                saveData(notes, newChecks);
            };

            const handleNoteChange = (dayIndex, text) => {
                const newNotes = { ...notes, [dayIndex]: text };
                setNotes(newNotes);
                
                // 防抖動 (Debounce): 避免打一個字就傳一次雲端
                if (window.saveTimeout) clearTimeout(window.saveTimeout);
                window.saveTimeout = setTimeout(() => {
                    saveData(newNotes, checkedItems);
                }, 1000);
            };

            const saveData = (newNotes, newChecks) => {
                if (db) {
                    setSyncStatus('儲存中...');
                    db.collection('trips').doc('kagawa2025').set({
                        notes: newNotes,
                        checkedItems: newChecks
                    }, { merge: true }).then(() => {
                        setSyncStatus('已同步');
                    }).catch(err => {
                        console.error(err);
                        setSyncStatus('儲存失敗');
                    });
                } else {
                    // 存到 LocalStorage
                    localStorage.setItem('trip_notes', JSON.stringify(newNotes));
                    localStorage.setItem('trip_checks', JSON.stringify(newChecks));
                }
            };

            // Map Helpers
            const getEmbedUrl = (query) => `https://maps.google.com/maps?q=${encodeURIComponent(query)}&t=&z=13&ie=UTF8&iwloc=&output=embed`;
            const openMap = (title, query) => {
                setCurrentMapTitle(title);
                setCurrentMapUrl(getEmbedUrl(query));
                setShowMap(true);
            };

            const kusamaColors = {
                yellow: 'bg-yellow-400',
                red: 'bg-red-500',
                dotPattern: "radial-gradient(#00000020 2px, transparent 2px)",
            };

            const itinerary = [
                {
                    day: "Day 1",
                    date: "12/25 (四)",
                    theme: "聖誕入宿與溫泉",
                    themeColor: "text-blue-600",
                    accentColor: "border-blue-500",
                    bgColor: "bg-blue-50",
                    highlight: "直奔琴平溫泉，享受飯店設施",
                    stay: "ことひら温泉 琴參閣",
                    stayQuery: "ことひら温泉 琴参閣",
                    details: [
                        { time: "08:50", icon: "plane", text: "台中機場起飛 (JX300)" },
                        { time: "12:20", icon: "mapPin", text: "抵達高松機場 (領取優惠券包)", mapQuery: "高松機場" },
                        { time: "13:00", icon: "bus", text: "搭乘機場巴士（琴平線）直達飯店", mapQuery: "高松機場 to ことひら温泉 琴参閣" },
                        { time: "15:00", icon: "moon", text: "入住琴參閣，享受展望風呂與日式客房", mapQuery: "ことひら温泉 琴参閣" },
                        { time: "18:00", icon: "utensils", text: "琴平溫泉街晚餐 (骨付鳥一鶴或飯店懷石)", mapQuery: "骨付鳥 一鶴 琴平店" }
                    ],
                    strategy: "第一天不排滿，利用星宇下午抵達的時間差，直接入住高級溫泉飯店放鬆，調整成度假模式。",
                    actionItems: [
                        { id: "d1-1", text: "確認機場巴士（琴平線）時刻表" },
                        { id: "d1-2", text: "確認琴參閣晚餐是否需要預約" }
                    ]
                },
                {
                    day: "Day 2",
                    date: "12/26 (五)",
                    theme: "文化體驗與防災採購",
                    themeColor: "text-amber-600",
                    accentColor: "border-amber-500",
                    bgColor: "bg-amber-50",
                    highlight: "資生堂神椿下午茶 & 輕裝購物",
                    stay: "Super Hotel 高松禁煙館",
                    stayQuery: "スーパーホテル高松禁煙館",
                    details: [
                        { time: "10:00", icon: "sun", text: "金刀比羅宮散策 (目標：500階)", mapQuery: "金刀比羅宮" },
                        { time: "11:30", icon: "coffee", text: "神椿 (Kamitsubaki) 資生堂下午茶/午餐", mapQuery: "資生堂パーラー 神椿" },
                        { time: "13:30", icon: "bus", text: "搭乘琴電 (Kotoden) 返回高松市區", mapQuery: "琴電琴平駅" },
                        { time: "15:00", icon: "shoppingBag", text: "飯店寄放行李 → 瓦町/DCM 採買防災用品", mapQuery: "DCM Takamatsu" },
                        { time: "18:00", icon: "moon", text: "入住 Super Hotel (享受天然溫泉)", mapQuery: "スーパーホテル高松禁煙館" }
                    ],
                    strategy: "不強求爬完 1368 階，改為優雅的下午茶行程。先回飯店放行李再購物，避免提重物移動。",
                    actionItems: [
                        { id: "d2-1", text: "列出防災用品採購清單" },
                        { id: "d2-2", text: "購買 IruCa 交通卡" }
                    ]
                },
                {
                    day: "Day 3",
                    date: "12/27 (六)",
                    theme: "小豆島公車漫遊",
                    themeColor: "text-green-600",
                    accentColor: "border-green-500",
                    bgColor: "bg-green-50",
                    highlight: "魔女宅急便風車 & 天使之路潮汐",
                    stay: "Super Hotel 高松禁煙館",
                    stayQuery: "スーパーホテル高松禁煙館",
                    details: [
                        { time: "09:00", icon: "ship", text: "高松港搭乘渡輪 (使用免費券) → 土庄港", mapQuery: "土庄港" },
                        { time: "10:30", icon: "bus", text: "轉乘橄欖巴士 → 橄欖公園 (白色風車)", mapQuery: "道の駅 小豆島オリーブ公園" },
                        { time: "12:30", icon: "utensils", text: "園區內午餐 (橄欖油料理)", mapQuery: "道の駅 小豆島オリーブ公園" },
                        { time: "15:30", icon: "camera", text: "天使之路 (Angel Road) *配合乾潮時間", mapQuery: "エンジェルロード" },
                        { time: "17:30", icon: "ship", text: "搭船返回高松，市區晚餐", mapQuery: "高松港" }
                    ],
                    strategy: "因租車滿額改為公車遊。放棄偏遠景點，專注於交通方便的橄欖公園與天使之路，步調更悠閒。",
                    actionItems: [
                        { id: "d3-1", text: "下載小豆島橄欖巴士時刻表" },
                        { id: "d3-2", text: "再次確認 12/27 當日乾潮時間" }
                    ]
                },
                {
                    day: "Day 4",
                    date: "12/28 (日)",
                    theme: "直島南瓜與名園抹茶",
                    themeColor: "text-red-600",
                    accentColor: "border-red-500",
                    bgColor: "bg-red-50",
                    highlight: "草間彌生南瓜朝聖 & 栗林公園",
                    stay: "Super Hotel 高松禁煙館",
                    stayQuery: "スーパーホテル高松禁煙館",
                    details: [
                        { time: "09:00", icon: "ship", text: "高松港 → 直島宮浦港 (紅南瓜合影)", mapQuery: "直島宮浦港" },
                        { time: "10:30", icon: "bus", text: "搭乘場內巴士 → 杜鵑莊 (黃南瓜朝聖)", mapQuery: "つつじ荘" },
                        { time: "14:20", icon: "ship", text: "搭船返回高松", mapQuery: "高松港" },
                        { time: "15:30", icon: "bus", text: "計程車直奔栗林公園", mapQuery: "栗林公園" },
                        { time: "16:00", icon: "coffee", text: "掬月亭抹茶體驗 (趕在 17:30 閉園前)", mapQuery: "掬月亭" }
                    ],
                    strategy: "即使週日美術館休館，但「南瓜」是戶外裝置不受影響。下午接栗林公園，利用免費入園票。",
                    actionItems: [
                        { id: "d4-1", text: "準備直島渡輪船費 (不含在免費券內)" },
                        { id: "d4-2", text: "確認栗林公園掬月亭最後點餐時間" }
                    ]
                },
                {
                    day: "Day 5",
                    date: "12/29 (一)",
                    theme: "職人烏龍麵與歸途",
                    themeColor: "text-purple-600",
                    accentColor: "border-purple-500",
                    bgColor: "bg-purple-50",
                    highlight: "清晨排隊名店 & 機場最後衝刺",
                    stay: "溫暖的家",
                    details: [
                        { time: "06:00", icon: "utensils", text: "步行至「手打十段 傻瓜一代」吃早餐", mapQuery: "手打十段 うどんバカ一代" },
                        { time: "09:00", icon: "shoppingBag", text: "瓦町商店街最後補貨 / 整理行李", mapQuery: "高松丸亀町商店街" },
                        { time: "11:00", icon: "bus", text: "搭乘機場巴士前往高松機場", mapQuery: "高松機場" },
                        { time: "13:20", icon: "plane", text: "星宇航空 JX301 起飛返台" }
                    ],
                    strategy: "利用早晨時間體驗在地「朝烏龍」文化。預留充足時間前往機場，避免年末人潮延誤。",
                    actionItems: [
                        { id: "d5-1", text: "Day 1 抵達時先確認烏龍麵店 29 號是否有開" },
                        { id: "d5-2", text: "確認機場巴士回程票券是否在身上" }
                    ]
                }
            ];

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 min-h-screen font-sans relative pb-20" 
                     style={{
                       backgroundColor: '#fbbf24',
                       backgroundImage: kusamaColors.dotPattern,
                       backgroundSize: '24px 24px'
                     }}>
                  
                  {/* Header Card */}
                  <div className="bg-white rounded-3xl shadow-xl p-6 md:p-8 mb-6 border-4 border-black relative overflow-hidden">
                    <div className="absolute top-0 right-0 w-32 h-32 bg-red-500 rounded-full -mr-10 -mt-10 opacity-20"></div>
                    
                    <h1 className="text-2xl md:text-4xl font-black text-gray-900 mb-2 tracking-tight">
                      🚢 瀨戶內海冬季任務
                    </h1>
                    <div className="flex justify-between items-center">
                        <div className="flex items-center gap-2 text-sm font-bold text-gray-600">
                            <span>2025/12/25 - 12/29</span>
                        </div>
                        {/* 顯示同步狀態 */}
                        <div className={`px-3 py-1 rounded-full text-xs font-bold ${syncStatus === '已同步' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}`}>
                            {db ? `☁️ ${syncStatus}` : '💾 本機模式 (無同步)'}
                        </div>
                    </div>
                  </div>

                  {/* Tabs */}
                  <div className="flex overflow-x-auto gap-2 mb-6 pb-2 scrollbar-hide px-1">
                    {itinerary.map((item, index) => (
                      <button
                        key={index}
                        onClick={() => setActiveTab(index)}
                        className={`flex-shrink-0 px-4 py-3 rounded-2xl font-bold transition-all duration-300 border-b-4 ${
                          activeTab === index 
                            ? 'bg-black text-yellow-400 border-black transform -translate-y-1 shadow-lg' 
                            : 'bg-white text-gray-800 border-gray-300'
                        }`}
                      >
                        <div className="text-xs opacity-70 mb-1">{item.date}</div>
                        <div className="text-lg">{item.day}</div>
                      </button>
                    ))}
                  </div>

                  {/* Main Content Area */}
                  <div className="grid md:grid-cols-3 gap-6">
                    
                    {/* Left Column: Itinerary Details */}
                    <div className="md:col-span-2 space-y-6">
                      <div className={`bg-white rounded-3xl shadow-xl p-6 border-l-8 ${itinerary[activeTab].accentColor}`}>
                        <div className="flex justify-between items-start mb-4">
                          <h2 className={`text-xl font-black ${itinerary[activeTab].themeColor}`}>{itinerary[activeTab].theme}</h2>
                          {activeTab === 3 && <div className="bg-red-500 text-white text-xs px-2 py-1 rounded-full font-bold animate-pulse">南瓜重點日</div>}
                        </div>
                        
                        <p className="bg-gray-100 px-3 py-2 rounded-lg text-gray-700 font-bold mb-6 text-sm inline-block">
                          ✨ {itinerary[activeTab].highlight}
                        </p>
                        
                        <div className="space-y-3">
                          {itinerary[activeTab].details.map((detail, idx) => (
                            <div key={idx} className="flex items-center gap-3 group bg-white hover:bg-gray-50 p-2 rounded-xl border border-transparent hover:border-gray-200">
                              <div className={`flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-black text-white`}>
                                <Icon name={detail.icon} size={16} />
                              </div>
                              <div className="flex-1 min-w-0">
                                <div className="font-bold text-gray-900 text-sm">{detail.time}</div>
                                <div className="text-gray-600 font-medium text-sm">{detail.text}</div>
                              </div>
                              {detail.mapQuery && (
                                <button 
                                  onClick={() => openMap(detail.text, detail.mapQuery)}
                                  className="flex-shrink-0 p-2 text-gray-400 hover:text-red-500"
                                >
                                  <Icon name="map" size={18} />
                                </button>
                              )}
                            </div>
                          ))}
                        </div>
                        
                        {/* Accommodation */}
                        <div className="mt-6 pt-4 border-t border-dashed border-gray-200">
                            <div className="flex justify-between items-center bg-indigo-50 p-3 rounded-xl">
                                <div className="flex items-center gap-2">
                                    <Icon name="moon" size={16} className="text-indigo-500"/>
                                    <span className="font-bold text-indigo-900 text-sm">{itinerary[activeTab].stay}</span>
                                </div>
                                {itinerary[activeTab].stayQuery && (
                                  <button onClick={() => openMap(itinerary[activeTab].stay, itinerary[activeTab].stayQuery)}>
                                    <Icon name="map" size={16} className="text-indigo-400"/>
                                  </button>
                                )}
                            </div>
                        </div>
                      </div>

                      {/* Strategy Box */}
                      <div className="bg-black text-white rounded-3xl p-5 shadow-xl relative overflow-hidden">
                        <div className="absolute -top-4 -right-4 w-16 h-16 bg-yellow-400 rounded-full blur-lg opacity-30"></div>
                        <h3 className="font-bold text-yellow-400 mb-2 flex items-center gap-2 text-sm">
                          <Icon name="info" size={16}/> 策略思考
                        </h3>
                        <p className="text-gray-300 text-sm leading-relaxed font-medium">
                          {itinerary[activeTab].strategy}
                        </p>
                      </div>
                    </div>

                    {/* Right Column: Interactive Tools */}
                    <div className="space-y-6">
                      
                      {/* Action Items Checklist */}
                      <div className="bg-white rounded-3xl shadow-xl p-6 border-2 border-gray-100">
                        <h3 className="font-black text-gray-900 mb-4 flex items-center gap-2 text-lg border-b-2 border-yellow-200 pb-2 inline-block">
                          <Icon name="checkSquare" size={20} className="text-green-500"/>
                          任務清單
                        </h3>
                        <div className="space-y-3">
                          {itinerary[activeTab].actionItems.map((item) => (
                            <label key={item.id} className="flex items-start gap-3 cursor-pointer p-3 bg-gray-50 hover:bg-yellow-50 rounded-xl transition-all border border-gray-100 hover:border-yellow-200">
                              <input 
                                type="checkbox" 
                                checked={checkedItems[item.id] || false}
                                onChange={() => handleCheck(item.id)}
                                className="mt-1 w-4 h-4 rounded text-black focus:ring-black border-gray-300"
                              />
                              <span className={`text-sm font-medium ${checkedItems[item.id] ? 'text-gray-400 line-through' : 'text-gray-700'}`}>
                                {item.text}
                              </span>
                            </label>
                          ))}
                        </div>
                      </div>

                      {/* Discussion Notes */}
                      <div className="bg-yellow-300 rounded-3xl shadow-xl p-1 pb-3 transform rotate-1 hover:rotate-0 transition-transform duration-300">
                         <div className="bg-white rounded-[20px] p-5 h-64 flex flex-col">
                          <h3 className="font-black text-gray-900 mb-3 flex items-center gap-2">
                            <Icon name="edit3" size={18} className="text-black"/>
                            討論筆記
                          </h3>
                          <textarea 
                            className="flex-1 w-full p-4 bg-yellow-50 rounded-xl text-gray-800 text-sm font-medium focus:ring-2 focus:ring-yellow-400 outline-none resize-none border-2 border-transparent focus:border-yellow-200 placeholder-gray-400"
                            placeholder={`寫下關於 ${itinerary[activeTab].day} 的想法...`}
                            value={notes[activeTab]}
                            onChange={(e) => handleNoteChange(activeTab, e.target.value)}
                          />
                        </div>
                      </div>

                    </div>
                  </div>

                  {/* Map Modal */}
                  {showMap && (
                    <div className="fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                      <div className="bg-white rounded-3xl shadow-2xl w-full max-w-4xl h-[80vh] flex flex-col overflow-hidden animate-fade-in-up border-4 border-yellow-400">
                        <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                          <h3 className="font-bold text-gray-900 flex items-center gap-2 text-lg truncate pr-4">
                            <Icon name="mapPin" size={20} className="text-red-500" />
                            {currentMapTitle}
                          </h3>
                          <button 
                            onClick={() => setShowMap(false)}
                            className="p-2 hover:bg-gray-200 rounded-full transition-colors"
                          >
                            <Icon name="x" size={24} className="text-gray-500"/>
                          </button>
                        </div>
                        <div className="flex-1 relative bg-gray-100">
                          <iframe
                            title="Map Preview"
                            width="100%"
                            height="100%"
                            frameBorder="0"
                            src={currentMapUrl}
                            allowFullScreen
                            className="w-full h-full"
                          ></iframe>
                          <div className="absolute bottom-6 right-6">
                             <a 
                               href={`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(currentMapTitle)}`}
                               target="_blank"
                               rel="noopener noreferrer"
                               className="bg-black text-yellow-400 px-6 py-3 rounded-full shadow-xl text-sm font-bold flex items-center gap-2 hover:bg-gray-800 hover:scale-105 transition-all"
                             >
                               <Icon name="externalLink" size={18}/>
                               在 Google Maps 開啟
                             </a>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TripPlanner />);
    </script>
</body>
</html>
