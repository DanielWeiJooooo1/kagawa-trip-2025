                        } else {
                            db.collection('trips').doc('kagawa2025_v5_plus_kusama').set({ notes: {}, checkedItems: {} });
                            setSyncStatus('● 新建立');
                        }
                    }, (err) => {
                        console.error(err);
                        setSyncStatus('✕ 同步失敗');
                    });
                    return () => unsubscribe();
                } else {
                    setSyncStatus('💾 本機模式');
                    const localData = localStorage.getItem('trip_local_v5_kusama');
                    if (localData) {
                        const parsed = JSON.parse(localData);
                        setUserNotes(parsed.notes || {});
                        setCheckedItems(parsed.checkedItems || {});
                    }
                }
            }, []);

            const saveToCloud = (notes, checks) => {
                if (db) {
                    setSyncStatus('儲存中...');
                    db.collection('trips').doc('kagawa2025_v5_plus_kusama').set({
                        notes: notes,
                        checkedItems: checks
                    }, { merge: true }).then(() => setSyncStatus('● 已同步'));
                } else {
                    localStorage.setItem('trip_local_v5_kusama', JSON.stringify({ notes, checkedItems: checks }));
                }
            };

            const handleCheck = (id) => {
                const newChecks = { ...checkedItems, [id]: !checkedItems[id] };
                setCheckedItems(newChecks);
                saveToCloud(userNotes, newChecks);
            };

            const handleNote = (day, text) => {
                const newNotes = { ...userNotes, [day]: text };
                setUserNotes(newNotes);
                if (window.saveTimer) clearTimeout(window.saveTimer);
                window.saveTimer = setTimeout(() => saveToCloud(newNotes, checkedItems), 1000);
            };

            // Responsive Layout: Dashboard
            const renderDashboard = () => (
                <div className="animate-fade-in space-y-8">
                    {/* Hero Section */}
                    <div className="kusama-card p-8 md:p-12 relative overflow-hidden bg-white">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-[#fbbf24] rounded-full -mr-16 -mt-16 border-4 border-black"></div>
                        <div className="relative z-10">
                            <h2 className="text-3xl md:text-5xl font-black text-black mb-4 tracking-tighter uppercase">
                                {tripData.intro.title}
                            </h2>
                            <h3 className="text-xl md:text-2xl font-bold text-gray-700 mb-6 border-l-8 border-black pl-4">
                                {tripData.intro.subtitle}
                            </h3>
                            <p className="text-gray-800 text-lg leading-relaxed max-w-2xl font-medium">
                                {tripData.intro.desc}
                            </p>
                        </div>
                    </div>

                    {/* Highlights Grid */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {tripData.highlights.map((h, idx) => (
                            <div key={idx} className="kusama-card p-6 bg-white hover:bg-yellow-50">
                                <div className="w-12 h-12 rounded-full bg-black text-[#fbbf24] flex items-center justify-center mb-4 border-2 border-[#fbbf24]">
                                    <Icon name={h.icon} size={24}/>
                                </div>
                                <h4 className="text-lg font-black text-black mb-2">{h.title}</h4>
                                <p className="text-sm text-gray-600 font-bold">{h.desc}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // Responsive Layout: Itinerary
            const renderItinerary = () => {
                const day = tripData.days[dayIdx];
                return (
                    <div className="animate-fade-in flex flex-col lg:flex-row gap-8">
                        {/* Sidebar: Day Tabs (Desktop) / Horizontal Scroll (Mobile) */}
                        <div className="lg:w-1/4 w-full flex lg:flex-col overflow-x-auto lg:overflow-visible gap-3 pb-2 lg:pb-0">
                            {tripData.days.map((d, idx) => (
                                <button 
                                    key={idx}
                                    onClick={() => setDayIdx(idx)}
                                    className={`flex-shrink-0 lg:w-full px-6 py-4 rounded-2xl font-black text-left transition-all border-4 ${
                                        dayIdx === idx 
                                        ? 'bg-black text-[#fbbf24] border-black shadow-[4px_4px_0px_0px_#fbbf24] transform -translate-y-1' 
                                        : 'bg-white text-black border-black hover:bg-gray-100'
                                    }`}
                                >
                                    <span className="text-xs opacity-70 block mb-1 uppercase tracking-widest">{d.date.split(" ")[0]}</span>
                                    <span className="text-xl">{d.title.split(" ")[0]}</span>
                                </button>
                            ))}
                        </div>

                        {/* Content: Timeline */}
                        <div className="lg:w-3/4 w-full">
                            <div className="kusama-card p-6 md:p-10 min-h-[60vh] bg-white">
                                <div className="mb-8 border-b-4 border-black pb-6 flex justify-between items-end">
                                    <div>
                                        <h3 className="text-3xl md:text-4xl font-black text-black mb-2">{day.title}</h3>
                                        <div className="inline-block bg-[#fbbf24] border-2 border-black px-3 py-1 rounded-full text-xs font-bold text-black uppercase tracking-wide">
                                            {day.date}
                                        </div>
                                    </div>
                                    <div className="hidden md:block text-right">
                                        <div className="text-sm font-bold text-gray-500 uppercase">Today's Highlight</div>
                                        <div className="text-lg font-black text-black">{day.highlight}</div>
                                    </div>
                                </div>

                                <div className="space-y-8 relative pl-6">
                                    <div className="absolute left-[23px] top-4 bottom-4 w-1 bg-black opacity-10"></div>
                                    {day.events.map((ev, i) => (
                                        <div key={i} className="relative flex gap-6 items-start group">
                                            {/* Icon Bubble */}
                                            <div className={`z-10 w-12 h-12 rounded-full flex items-center justify-center shrink-0 border-4 border-black bg-white group-hover:scale-110 transition-transform ${
                                                ev.type === 'critical' ? 'bg-red-500 text-white' : 
                                                ev.type === 'dining' ? 'bg-[#fbbf24] text-black' : 
                                                'text-black'
                                            }`}>
                                                <Icon name={ev.icon} size={20}/>
                                            </div>
                                            
                                            <div className="flex-1 pt-1">
                                                <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-2">
                                                    <h4 className={`text-xl font-black ${ev.type === 'critical' ? 'text-red-600' : 'text-black'}`}>
                                                        {ev.title}
                                                    </h4>
                                                    <div className="flex items-center gap-2 mt-1 sm:mt-0">
                                                        <span className="font-bold text-sm bg-black text-white px-2 py-0.5 rounded">{ev.time}</span>
                                                        {ev.mapQuery && (
                                                            <button onClick={() => openMap(ev.mapQuery)} className="text-gray-400 hover:text-red-500 transition-colors" title="Open Map">
                                                                <Icon name="mapPin" size={18}/>
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                                <p className="text-base text-gray-700 font-medium leading-relaxed">{ev.desc}</p>
                                                
                                                {ev.type === 'dining' && (
                                                    <button 
                                                        onClick={() => setDiningId(ev.diningId)}
                                                        className="mt-3 text-sm font-black text-black underline decoration-4 decoration-[#fbbf24] underline-offset-4 hover:decoration-red-500 transition-all flex items-center gap-1"
                                                    >
                                                        查看 3 層備案 <Icon name="chevronDown" size={16}/>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Note Area */}
                                <div className="mt-12 bg-[#fbbf24] p-1 rounded-xl transform rotate-1">
                                    <div className="bg-white p-4 rounded-lg border-2 border-black h-full">
                                        <label className="text-xs font-black text-black uppercase mb-2 block tracking-widest flex items-center gap-2">
                                            <Icon name="penTool" size={14}/> {day.date} Memo
                                        </label>
                                        <textarea 
                                            className="w-full bg-transparent text-lg font-bold text-gray-800 placeholder-gray-300 focus:outline-none resize-none"
                                            rows="3"
                                            placeholder="Write something..."
                                            value={userNotes[day.id] || ''}
                                            onChange={(e) => handleNote(day.id, e.target.value)}
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderShopping = () => (
                <div className="animate-fade-in grid grid-cols-1 md:grid-cols-2 gap-8">
                    {/* Heavy List */}
                    <div className="kusama-card bg-white overflow-hidden">
                        <div className="bg-red-500 p-6 border-b-4 border-black">
                            <h3 className="text-2xl font-black text-white flex items-center gap-3">
                                <div className="bg-black p-2 rounded-full"><Icon name="weight" size={24} className="text-white"/></div>
                                Day 2: 重物家電
                            </h3>
                            <p className="text-white font-bold mt-2 opacity-90">Rainbow Road (DCM/Yamada) · 計程車</p>
                        </div>
                        <div className="p-6 space-y-4">
                            {tripData.shoppingHeavy.map((item, idx) => (
                                <label key={idx} className="flex items-start gap-4 cursor-pointer group p-2 hover:bg-red-50 rounded-xl transition-colors">
                                    <div className="relative flex items-center">
                                        <input 
                                            type="checkbox" 
                                            checked={checkedItems[item.id] || false}
                                            onChange={() => handleCheck(item.id)}
                                            className="peer h-6 w-6 cursor-pointer appearance-none rounded-md border-2 border-black bg-white transition-all checked:bg-red-500 checked:border-red-500"
                                        />
                                        <Icon name="check" size={16} className="absolute left-1 top-1 text-white opacity-0 peer-checked:opacity-100 pointer-events-none"/>
                                    </div>
                                    <div className="flex-1">
                                        <span className={`text-lg font-bold block transition-colors ${checkedItems[item.id] ? 'text-gray-400 line-through decoration-2' : 'text-black'}`}>
                                            {item.item}
                                        </span>
                                        <span className="text-sm font-bold text-gray-500 block mt-1">{item.note} <span className="bg-black text-white px-1.5 rounded text-xs ml-1">@{item.loc}</span></span>
                                    </div>
                                </label>
                            ))}
                        </div>
                    </div>

                    {/* Light List */}
                    <div className="kusama-card bg-white overflow-hidden">
                        <div className="bg-[#fbbf24] p-6 border-b-4 border-black">
                            <h3 className="text-2xl font-black text-black flex items-center gap-3">
                                <div className="bg-black p-2 rounded-full"><Icon name="feather" size={24} className="text-[#fbbf24]"/></div>
                                Day 4: 輕物藥妝
                            </h3>
                            <p className="text-black font-bold mt-2 opacity-80">瓦町 & 商店街 · 步行</p>
                        </div>
                        <div className="p-6 space-y-4">
                            {tripData.shoppingLight.map((item, idx) => (
                                <label key={idx} className="flex items-start gap-4 cursor-pointer group p-2 hover:bg-yellow-50 rounded-xl transition-colors">
                                    <div className="relative flex items-center">
                                        <input 
                                            type="checkbox" 
                                            checked={checkedItems[item.id] || false}
                                            onChange={() => handleCheck(item.id)}
                                            className="peer h-6 w-6 cursor-pointer appearance-none rounded-md border-2 border-black bg-white transition-all checked:bg-black checked:border-black"
                                        />
                                        <Icon name="check" size={16} className="absolute left-1 top-1 text-[#fbbf24] opacity-0 peer-checked:opacity-100 pointer-events-none"/>
                                    </div>
                                    <div className="flex-1">
                                        <span className={`text-lg font-bold block transition-colors ${checkedItems[item.id] ? 'text-gray-400 line-through decoration-2' : 'text-black'}`}>
                                            {item.item}
                                        </span>
                                        <span className="text-sm font-bold text-gray-500 block mt-1">{item.note} <span className="bg-black text-white px-1.5 rounded text-xs ml-1">@{item.loc}</span></span>
                                    </div>
                                </label>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const renderChecklist = () => (
                <div className="animate-fade-in max-w-2xl mx-auto">
                    <div className="kusama-card bg-white p-8">
                        <h2 className="text-2xl font-black text-black mb-6 flex items-center gap-3 border-b-4 border-green-500 pb-4 inline-block">
                            <Icon name="checkCircle" className="text-green-500" size={28}/> 行前 & 關鍵行動
                        </h2>
                        <div className="space-y-4">
                            {tripData.checklist.map((item, idx) => (
                                <label key={idx} className="flex items-center gap-4 p-4 bg-gray-50 rounded-xl hover:bg-green-50 transition-colors cursor-pointer border-2 border-transparent hover:border-green-200">
                                    <div className="relative flex items-center">
                                        <input 
                                            type="checkbox" 
                                            checked={checkedItems[`chk_${idx}`] || false}
                                            onChange={() => handleCheck(`chk_${idx}`)}
                                            className="peer h-6 w-6 cursor-pointer appearance-none rounded-full border-2 border-black bg-white transition-all checked:bg-green-500 checked:border-green-500"
                                        />
                                        <Icon name="check" size={14} className="absolute left-1 top-1 text-white opacity-0 peer-checked:opacity-100 pointer-events-none"/>
                                    </div>
                                    <span className={`text-base font-bold ${checkedItems[`chk_${idx}`] ? 'text-gray-400 line-through decoration-2' : 'text-gray-800'}`}>
                                        {item}
                                    </span>
                                </label>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col pb-24 md:pb-0">
                    {/* Top Bar */}
                    <div className="bg-black text-white px-4 py-3 sticky top-0 z-50 shadow-md">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <h1 className="text-lg md:text-xl font-black flex items-center gap-2 tracking-wider">
                                <span className="text-[#fbbf24] text-2xl">●</span> KAGAWA TRIP <span className="text-[#fbbf24]">V5.0+</span>
                            </h1>
                            <div className="flex items-center gap-4">
                                <span className={`text-xs font-bold px-3 py-1 rounded-full ${syncStatus.includes('已同步') ? 'bg-green-500 text-white' : 'bg-gray-700 text-gray-300'}`}>
                                    {syncStatus}
                                </span>
                                {/* Desktop Nav */}
                                <div className="hidden md:flex gap-2">
                                    {[
                                        { id: 'dashboard', icon: 'layoutDashboard', label: '戰情室' },
                                        { id: 'itinerary', icon: 'map', label: '每日行程' },
                                        { id: 'shopping', icon: 'shoppingBag', label: '購物戰略' },
                                        { id: 'checklist', icon: 'checkSquare', label: '檢查表' },
                                    ].map(tab => (
                                        <button 
                                            key={tab.id}
                                            onClick={() => setView(tab.id)}
                                            className={`px-4 py-2 rounded-lg font-bold text-sm transition-colors flex items-center gap-2 ${
                                                view === tab.id 
                                                ? 'bg-[#fbbf24] text-black' 
                                                : 'text-gray-400 hover:text-white hover:bg-gray-800'
                                            }`}
                                        >
                                            <Icon name={tab.icon} size={16}/> {tab.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Content Area */}
                    <div className="flex-1 p-4 md:p-8 max-w-7xl mx-auto w-full">
                        {view === 'dashboard' && renderDashboard()}
                        {view === 'itinerary' && renderItinerary()}
                        {view === 'shopping' && renderShopping()}
                        {view === 'checklist' && renderChecklist()}
                    </div>

                    {/* Mobile Bottom Nav */}
                    <div className="md:hidden fixed bottom-0 w-full bg-black border-t-4 border-[#fbbf24] flex justify-around py-3 pb-safe z-40">
                        {[
                            { id: 'dashboard', icon: 'layoutDashboard', label: '總覽' },
                            { id: 'itinerary', icon: 'map', label: '行程' },
                            { id: 'shopping', icon: 'shoppingBag', label: '購物' },
                            { id: 'checklist', icon: 'checkSquare', label: '清單' },
                        ].map(tab => (
                            <button 
                                key={tab.id}
                                onClick={() => setView(tab.id)}
                                className={`flex flex-col items-center gap-1 ${view === tab.id ? 'text-[#fbbf24]' : 'text-gray-500'}`}
                            >
                                <Icon name={tab.icon} size={24} />
                                <span className="text-[10px] font-black tracking-wide">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Modals */}
                    <DiningModal 
                        diningId={diningId} 
                        options={tripData.diningOptions} 
                        onClose={() => setDiningId(null)} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
